name: climatechecker-dev
services:
  db:
    image: mariadb:11
    container_name: climatechecker-dev-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ontdekstation013
    volumes:
      - "./res/dump-ontdekstation013-202506121529.sql:/docker-entrypoint-initdb.d/1.sql"
    ports:
      - "3306:3306"

  app:
    build: .
    image: climatechecker-springboot:dev
    container_name: climatechecker-dev-springboot
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "8082:8082"
    depends_on:
      - db