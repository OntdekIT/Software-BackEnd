server.port=8082
spring.jpa.hibernate.ddl-auto=validate
spring.mail.properties.mail.smtp.starttls.enable=true
application.timezone=UTC
frontend.host=http://localhost:5173

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.flyway.url=${SPRING_DATASOURCE_URL}
spring.flyway.user=${SPRING_DATASOURCE_USERNAME}
spring.flyway.password=${SPRING_DATASOURCE_PASSWORD}
spring.flyway.schemas=ontdekstation013

spring.mail.host=${MAILSERVER_RELAY_HOST}
spring.mail.port=${MAILSERVER_RELAY_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

application.root-user.first-name=${ROOT_USER_FIRSTNAME}
application.root-user.last-name=${ROOT_USER_LASTNAME}
application.root-user.email=${ROOT_USER_EMAIL}
application.root-user.password=${ROOT_USER_PASSWORD}
