name: Sonar Scan

on:
  push:
    branches:
      - "*"

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: List repository files (debugging)
        run: ls -R

      - name: Build Project
        run: mvn clean install -DskipTests
        working-directory: ClimateChecker

      - name: Debug SonarQube Configuration
        run: |
          cd ClimateChecker
          echo "Current Directory:"
          pwd
          echo "Listing Files:"
          ls -la
          if [ -f sonar-project.properties ]; then
            echo "✅ sonar-project.properties found"
            cat sonar-project.properties
          else
            echo "❌ sonar-project.properties NOT found!"
            exit 1
          fi

      - name: Install SonarScanner CLI
        run: |
          mkdir -p /home/runner/work/_temp/sonarscanner
          cd /home/runner/work/_temp/sonarscanner
          SCANNER_FILE_NAME=sonar-scanner-cli-4.6.2.2472-linux.zip
          SCANNER_URI=https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.6.2.2472-linux.zip
          wget --no-verbose --user-agent=sonarqube-scan-action $SCANNER_URI
          unzip -q $SCANNER_FILE_NAME
          SCANNER_FOLDER=sonar-scanner-4.6.2.2472-linux
          mv $SCANNER_FOLDER /home/runner/work/_temp/sonar-scanner
          echo "/home/runner/work/_temp/sonar-scanner/bin" >> $GITHUB_PATH

      - name: Run SonarQube Scan
        run: |
          cd ClimateChecker
          sonar-scanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: 'https://sonarcloud.io/'
