name: Backend CI to Docker Hub

on:
  push:
    branches: [ "main", "develop", "s3nj25", "s3nj25_dev" ]
  pull_request:
    branches: [ "main", "develop", "s3nj25", "s3nj25_dev" ]

jobs:
  build-test:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: climatechecker_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: ClimateChecker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: 'ClimateChecker/pom.xml'

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Run unit tests
        run: |
          ./mvnw clean test --no-transfer-progress \
            -Dspring.datasource.url=jdbc:mariadb://localhost:3306/climatechecker_test \
            -Dspring.datasource.username=root \
            -Dspring.datasource.password=test

      - name: Build Docker image
        run: docker build -t climatechecker-backend .

      - name: Create docker-compose for testing
        run: |
          cat > docker-compose.test.yml << EOF
          version: '3.8'
          services:
            backend:
              image: climatechecker-backend
              ports:
                - "8082:8082"
              environment:
                SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/climatechecker_test
                SPRING_DATASOURCE_USERNAME: root
                SPRING_DATASOURCE_PASSWORD: test
                SPRING_JPA_HIBERNATE_DDL_AUTO: update
                SPRING_FLYWAY_ENABLED: false
                MAILSERVER_RELAY_HOST: smtp.test.local
                MAILSERVER_RELAY_PORT: 587
                MAILSERVER_RELAY_USER: test@test.local
                MAILSERVER_RELAY_PASSWORD: testpassword
                MAIL_USERNAME: test@test.local
                MAIL_PASSWORD: testpassword
                ROOT_USER_FIRSTNAME: Test
                ROOT_USER_LASTNAME: User
                ROOT_USER_EMAIL: test@test.local
              depends_on:
                db:
                  condition: service_healthy
            
            db:
              image: mariadb:11
              environment:
                MYSQL_ROOT_PASSWORD: test
                MYSQL_DATABASE: climatechecker_test
              healthcheck:
                test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
                interval: 10s
                timeout: 5s
                retries: 5
          EOF

      - name: Start Docker containers
        run: |
          docker compose -f docker-compose.test.yml up -d
          sleep 30

      - name: Test backend health
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8082/actuator/health; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend... attempt $i/30"
            sleep 2
          done
          echo "Backend health check failed"
          docker compose -f docker-compose.test.yml logs backend
          exit 1

      - name: Test API endpoints
        run: |
          curl -f http://localhost:8082/api/stations || exit 1
          curl -f http://localhost:8082/api/measurements || exit 1

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        if: github.event_name == 'push'
        run: |
          BRANCH_NAME=${GITHUB_REF##*/}
          docker tag climatechecker-backend ${{ secrets.DOCKER_USERNAME }}/climatechecker-backend:${BRANCH_NAME}
          docker tag climatechecker-backend ${{ secrets.DOCKER_USERNAME }}/climatechecker-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/climatechecker-backend:${BRANCH_NAME}
          docker push ${{ secrets.DOCKER_USERNAME }}/climatechecker-backend:latest

