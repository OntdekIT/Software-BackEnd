name: Backend CI to GitHub Container Registry

on:
  push:
    branches: [ "main", "develop", "s3nj25", "s3nj25_dev" ]
  pull_request:
    branches: [ "main", "develop", "s3nj25", "s3nj25_dev" ]

jobs:
  build-test:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    services:
      mariadb:
        image: mariadb:11
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: climatechecker_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: ClimateChecker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: 'ClimateChecker/pom.xml'

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Run unit tests
        run: |
          ./mvnw clean test --no-transfer-progress \
            -Dspring.datasource.url=jdbc:mariadb://localhost:3306/climatechecker_test \
            -Dspring.datasource.username=root \
            -Dspring.datasource.password=test

      - name: Get previous Git tag
        id: previoustag
        uses: WyriHaximus/github-action-get-previous-tag@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get next release version
        id: next
        uses: WyriHaximus/github-action-next-release-version@1.0.0
        with:
          version: ${{ steps.previoustag.outputs.tag }}

      - name: Set lowercase owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t climatechecker-backend \
            --label "org.opencontainers.image.version=${{ steps.next.outputs.version }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            .

      - name: Create docker-compose for testing
        run: |
          cat > docker-compose.test.yml << EOF
          services:
            backend:
              image: climatechecker-backend
              ports:
                - "8082:8082"
              environment:
                SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/climatechecker_test
                SPRING_DATASOURCE_USERNAME: root
                SPRING_DATASOURCE_PASSWORD: test
                SPRING_JPA_HIBERNATE_DDL_AUTO: update
                SPRING_FLYWAY_ENABLED: false
                MAILSERVER_RELAY_HOST: smtp.test.local
                MAILSERVER_RELAY_PORT: 587
                MAILSERVER_RELAY_USER: test@test.local
                MAILSERVER_RELAY_PASSWORD: testpassword
                MAIL_USERNAME: test@test.local
                MAIL_PASSWORD: testpassword
                ROOT_USER_FIRSTNAME: Test
                ROOT_USER_LASTNAME: User
                ROOT_USER_EMAIL: test@test.local
                ROOT_USER_PASSWORD: TestPassword123!
              depends_on:
                db:
                  condition: service_healthy

            db:
              image: mariadb:11
              environment:
                MYSQL_ROOT_PASSWORD: test
                MYSQL_DATABASE: climatechecker_test
              healthcheck:
                test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
                interval: 10s
                timeout: 5s
                retries: 5
          EOF

      - name: Start Docker containers
        run: |
          docker compose -f docker-compose.test.yml up -d
          sleep 30

      - name: Test backend health
        run: |
          for i in {1..30}; do
            if docker compose -f docker-compose.test.yml ps backend | grep -q "Up"; then
              echo "Backend container is running"
              sleep 5
              if docker compose -f docker-compose.test.yml logs backend | grep -q "Started ClimateCheckerApplication"; then
                echo "Backend application started successfully"
                exit 0
              fi
            fi
            echo "Waiting for backend... attempt $i/30"
            sleep 2
          done
          echo "Backend health check failed"
          docker compose -f docker-compose.test.yml logs backend
          exit 1

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ClimateChecker
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/climatechecker-backend:latest
            ghcr.io/${{ steps.owner.outputs.owner }}/climatechecker-backend:${{ steps.next.outputs.version }}
          labels: |
            org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            org.opencontainers.image.source=${{ github.repository }}
